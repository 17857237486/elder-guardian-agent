<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MQTT 浼犳劅鍣ㄦ暟鎹褰?/title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
        background: #f5f7fa;
        color: #152033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(1500px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 22px 0 32px;
      }

      header {
        padding-bottom: 16px;
        border-bottom: 1px solid #d9e2ee;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }

      h2 {
        margin: 0;
        padding: 14px 16px;
        border-bottom: 1px solid #e1e8f1;
        font-size: 18px;
      }

      .muted {
        margin: 0;
        color: #607086;
        line-height: 1.6;
      }

      .status-bar {
        display: grid;
        grid-template-columns: repeat(5, minmax(150px, 1fr));
        gap: 10px;
        margin: 16px 0;
      }

      .status-item,
      .panel {
        border: 1px solid #d9e2ee;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
      }

      .status-item {
        padding: 12px 14px;
      }

      .status-item span {
        display: block;
        margin-bottom: 6px;
        color: #627188;
        font-size: 13px;
      }

      .status-item strong {
        display: block;
        font-size: 18px;
        color: #0d6674;
        overflow-wrap: anywhere;
      }

      .panel {
        overflow: hidden;
      }

      .panel + .panel,
      .records-grid {
        margin-top: 16px;
      }

      .page-zone {
        margin-top: 18px;
        border: 1px solid #cfd9e6;
        border-radius: 10px;
        background: #eef4f8;
        overflow: hidden;
      }

      .zone-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 16px;
        border-bottom: 1px solid #cfd9e6;
        background: #f8fbff;
      }

      .zone-header h2 {
        margin: 0;
        padding: 0;
        border: 0;
        font-size: 20px;
      }

      .zone-header p {
        margin: 0;
        color: #607086;
        line-height: 1.5;
      }

      .zone-body {
        padding: 16px;
      }

      .zone-body > .panel:first-child {
        margin-top: 0;
      }

      .table-wrap {
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid #edf1f6;
        text-align: left;
        vertical-align: middle;
        white-space: nowrap;
      }

      th {
        background: #f8fbff;
        color: #4e5f75;
        font-weight: 700;
      }

      input,
      select {
        width: 100%;
        min-width: 90px;
        height: 34px;
        border: 1px solid #cfd9e6;
        border-radius: 6px;
        padding: 0 9px;
        color: #152033;
        font: inherit;
      }

      input:focus,
      select:focus {
        border-color: #0d8b92;
        outline: 2px solid rgba(13, 139, 146, 0.14);
      }

      input[type="checkbox"] {
        width: auto;
        min-width: 0;
        height: auto;
      }

      button {
        height: 34px;
        padding: 0 12px;
        border: 1px solid #cfd9e6;
        border-radius: 6px;
        background: #fff;
        color: #152033;
        font: inherit;
        cursor: pointer;
      }

      button.primary {
        border-color: #087f83;
        background: #087f83;
        color: #fff;
      }

      .file-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 34px;
        padding: 0 12px;
        border: 1px solid #cfd9e6;
        border-radius: 6px;
        background: #fff;
        color: #22304a;
        cursor: pointer;
        font-size: 14px;
      }

      button.template-button {
        height: auto;
        min-height: 54px;
        padding: 8px 10px;
        text-align: left;
        border-color: #d7e1ed;
      }

      button.template-button.active {
        border-color: #087f83;
        background: #e9f7f5;
        color: #075f62;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 16px;
      }

      .baseline-panel {
        padding: 16px;
      }

      .baseline-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(260px, 1fr));
        gap: 16px;
      }

      .baseline-card {
        border: 1px solid #d9e2ee;
        border-radius: 8px;
        padding: 14px;
        background: #fbfdff;
      }

      .baseline-card h3 {
        margin: 0 0 10px;
      }

      .baseline-fields {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .baseline-fields label {
        display: block;
        color: #4e5f75;
        font-weight: 700;
      }

      .baseline-fields span {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .presence-monitor {
        margin-top: 16px;
        border: 1px solid #cddcec;
        border-radius: 10px;
        padding: 14px;
        background: #f8fbff;
      }

      .presence-monitor h3 {
        margin: 0 0 8px;
      }

      .presence-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(130px, 1fr));
        gap: 10px;
        margin: 12px 0;
      }

      .presence-room {
        border: 1px solid #d9e2ee;
        border-radius: 8px;
        padding: 10px;
        background: #fff;
      }

      .presence-room strong {
        display: block;
        margin-bottom: 6px;
      }

      .presence-room.present {
        border-color: #62b58d;
        background: #edf9f1;
      }

      .presence-summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(150px, 1fr));
        gap: 10px;
      }

      .presence-summary div,
      .presence-trace li {
        border: 1px solid #edf1f6;
        border-radius: 8px;
        padding: 8px 10px;
        background: #fff;
      }

      .presence-summary span {
        display: block;
        color: #607086;
        font-size: 12px;
      }

      .presence-summary strong {
        display: block;
        margin-top: 4px;
        color: #17324d;
        overflow-wrap: anywhere;
      }

      .presence-trace {
        display: grid;
        gap: 6px;
        max-height: 210px;
        margin: 10px 0 0;
        padding: 0;
        overflow: auto;
        list-style: none;
      }

      .presence-flow-wrap {
        max-height: 360px;
        margin-top: 12px;
        border: 1px solid #edf1f6;
        border-radius: 8px;
        background: #fff;
      }

      .presence-result {
        display: inline-flex;
        align-items: baseline;
        gap: 12px;
        margin-top: 12px;
        padding: 10px 14px;
        border: 1px solid #cddcec;
        border-radius: 8px;
        background: #fff;
      }

      .presence-result span {
        color: #607086;
        font-size: 13px;
      }

      .presence-result strong {
        color: #0d6674;
        font-size: 20px;
      }

      .vision-capture-panel {
        display: grid;
        gap: 12px;
      }

      .vision-capture-summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(150px, 1fr));
        gap: 10px;
      }

      .vision-capture-summary div,
      .vision-capture-list li {
        border: 1px solid #dce7f4;
        border-radius: 8px;
        padding: 8px 10px;
        background: #f8fbff;
      }

      .vision-capture-summary span {
        display: block;
        color: #607086;
        font-size: 12px;
      }

      .vision-capture-summary strong {
        display: block;
        margin-top: 4px;
        color: #17324d;
      }

      .vision-capture-list {
        display: grid;
        gap: 6px;
        max-height: 260px;
        margin: 0;
        padding-left: 20px;
        overflow: auto;
      }

      .template-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(135px, 1fr));
        gap: 10px;
        padding: 16px;
      }

      .template-note {
        margin: 0 16px 16px;
        border: 1px solid #d9e2ee;
        border-radius: 8px;
        overflow: hidden;
      }

      .timeline-panel {
        padding: 16px;
      }

      .timeline-grid {
        display: grid;
        grid-template-columns: 1.05fr 1.05fr 1fr 1.2fr 0.9fr;
        gap: 12px;
        align-items: end;
      }

      .timeline-field label {
        display: block;
        margin-bottom: 6px;
        color: #4e5f75;
        font-weight: 700;
      }

      .timeline-field output {
        display: block;
        margin-top: 6px;
        color: #087f83;
        font-weight: 800;
      }

      .timeline-field input[type="range"] {
        padding: 0;
      }

      .scenario-summary {
        margin-top: 14px;
        display: grid;
        gap: 10px;
      }

      .scenario-summary-row {
        display: grid;
        grid-template-columns: 110px minmax(0, 1fr);
        gap: 12px;
        padding: 12px 14px;
        border: 1px solid #e0e7f0;
        border-radius: 8px;
        background: #fbfdff;
      }

      .scenario-summary-row b {
        color: #4e5f75;
      }

      .scenario-summary-row span {
        white-space: normal;
        line-height: 1.6;
      }

      .scenario-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 12px 14px;
        border: 1px solid #e0e7f0;
        border-radius: 8px;
        background: #fbfdff;
      }

      .realtime-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #4e5f75;
        font-weight: 700;
        white-space: nowrap;
      }

      .scenario-action-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .form-block {
        border: 1px solid #e0e7f0;
        border-radius: 8px;
        overflow: hidden;
      }

      .form-block h3 {
        margin: 0;
        padding: 12px 14px;
        border-bottom: 1px solid #e0e7f0;
        background: #fbfdff;
        font-size: 16px;
      }

      .rule-hints {
        display: grid;
        gap: 8px;
        padding: 12px 14px;
        border-top: 1px solid #e0e7f0;
        background: #fbfdff;
      }

      .rule-hints h4 {
        margin: 0;
        color: #4e5f75;
        font-size: 14px;
      }

      .hint-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .hint-item {
        display: grid;
        gap: 4px;
        padding: 9px 10px;
        border: 1px solid #e0e7f0;
        border-radius: 6px;
        background: #fff;
      }

      .hint-item strong {
        color: #152033;
        font-size: 13px;
      }

      .hint-item span {
        color: #607086;
        font-size: 12px;
        line-height: 1.45;
        white-space: normal;
      }

      .form-table th {
        width: 92px;
      }

      .form-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        background: #fbfdff;
      }

      .submit-status {
        color: #607086;
        font-size: 13px;
        white-space: normal;
      }

      .submit-status.ok {
        color: #087f83;
      }

      .submit-status.error {
        color: #b42318;
      }

      .section-row th {
        background: #edf7f5;
        color: #006b65;
        font-size: 15px;
      }

      .section-row.env th {
        background: #eef4ff;
        color: #175cd3;
      }

      .unit {
        color: #66758a;
        font-size: 13px;
      }

      .records-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        align-items: start;
      }

      .record-table th {
        position: sticky;
        top: 0;
        z-index: 1;
      }

      .record-table-wrap {
        max-height: 620px;
      }

      .empty {
        padding: 18px 16px;
        color: #66758a;
      }

      .toolbar {
        display: flex;
        justify-content: flex-end;
        padding: 12px 16px;
        border-bottom: 1px solid #e1e8f1;
      }

      .device-panel-body {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 16px;
      }

      .current-scene-status {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        padding: 12px;
        border: 1px solid #e0e7f0;
        border-radius: 8px;
        background: #fbfdff;
      }

      .current-scene-status div {
        min-width: 0;
        padding: 9px 10px;
        border: 1px solid #edf1f6;
        border-radius: 6px;
        background: #fff;
      }

      .current-scene-status span {
        display: block;
        color: #66758a;
        font-size: 12px;
      }

      .current-scene-status strong {
        display: block;
        margin-top: 4px;
        color: #152033;
        overflow-wrap: anywhere;
      }

      .device-rooms {
        display: grid;
        grid-template-columns: repeat(4, minmax(240px, 1fr));
        gap: 12px;
        align-items: start;
      }

      .device-room {
        border: 1px solid #e0e7f0;
        border-radius: 8px;
        background: #fbfdff;
        overflow: hidden;
      }

      .device-room h3 {
        margin: 0;
        padding: 10px 12px;
        border-bottom: 1px solid #e0e7f0;
        color: #4e5f75;
        font-size: 15px;
      }

      .room-env-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid #e0e7f0;
        background: #fff;
      }

      .room-env-item {
        min-width: 0;
        padding: 8px;
        border: 1px solid #edf1f6;
        border-radius: 6px;
        background: #f8fbff;
      }

      .room-env-item span {
        display: block;
        color: #66758a;
        font-size: 12px;
      }

      .room-env-item strong {
        display: block;
        margin-top: 3px;
        color: #152033;
        font-size: 17px;
        line-height: 1.2;
      }

      .room-env-time {
        padding: 0 12px 10px;
        border-bottom: 1px solid #edf1f6;
        background: #fff;
        color: #66758a;
        font-size: 12px;
      }

      .device-card {
        padding: 12px;
        border-bottom: 1px solid #edf1f6;
      }

      .device-card:last-child {
        border-bottom: 0;
      }

      .device-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 9px;
      }

      .device-name {
        font-weight: 800;
      }

      .device-state {
        min-width: 68px;
        padding: 4px 8px;
        border-radius: 999px;
        background: #eef4ff;
        color: #175cd3;
        text-align: center;
        font-size: 13px;
        font-weight: 800;
      }

      .device-state.on,
      .device-state.open {
        background: #ecfdf3;
        color: #067647;
      }

      .device-state.off,
      .device-state.closed {
        background: #f2f4f7;
        color: #475467;
      }

      .device-controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .device-controls button {
        width: 100%;
        min-width: 0;
        white-space: nowrap;
      }

      .device-temp {
        display: grid;
        grid-template-columns: minmax(64px, 1fr) 64px;
        gap: 8px;
        margin-top: 8px;
      }

      .device-temp input,
      .device-temp button {
        min-width: 0;
      }

      .device-temp button {
        padding: 0 6px;
        overflow: hidden;
        text-overflow: clip;
      }

      .device-log-panel {
        border: 1px solid #e0e7f0;
        border-radius: 8px;
        background: #fbfdff;
        padding: 12px;
      }

      .device-log-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .device-log-toolbar h3 {
        margin: 0;
        color: #4e5f75;
        font-size: 15px;
      }

      .device-log-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .device-log {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        max-height: 220px;
        overflow: auto;
      }

      .device-log-item {
        padding: 9px 10px;
        border: 1px solid #e0e7f0;
        border-radius: 7px;
        background: #fff;
        color: #4e5f75;
        font-family: Consolas, "Courier New", monospace;
        font-size: 12px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .device-log-item.error {
        border-color: #fecdca;
        background: #fef3f2;
        color: #b42318;
      }

      .device-log-item.guardian_core {
        border-color: #bfdbfe;
        background: #eff6ff;
        color: #175cd3;
      }

      .device-log-item.device_command {
        border-color: #fedf89;
        background: #fffaeb;
        color: #93370d;
      }

      .device-log-item.device_state,
      .device-log-item.device_ack,
      .device-log-item.manual_command {
        border-color: #abefc6;
        background: #ecfdf3;
        color: #067647;
      }

      @media (max-width: 1180px) {
        .status-bar,
        .template-grid,
        .timeline-grid,
        .form-grid,
        .records-grid,
        .device-panel-body,
        .current-scene-status,
        .device-rooms,
        .device-log {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        main {
          width: min(100vw - 24px, 1500px);
          padding-top: 16px;
        }

        .status-bar {
          grid-template-columns: 1fr;
        }

        .scenario-summary-row,
        .scenario-actions,
        .scenario-action-right {
          align-items: stretch;
          display: flex;
          flex-direction: column;
        }

        .hint-grid {
          grid-template-columns: 1fr;
        }

        .realtime-toggle {
          white-space: normal;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>MQTT 浼犳劅鍣ㄦ暟鎹褰?/h1>
        <p class="muted">鐙珛鐩戝惉涓荤郴缁熸爣鍑嗘秷鎭紝涔熷彲浠ユ墜鍔ㄥ綍鍏ユ暟鎹苟鍙戦€佺粰 Mosquitto锛岀敱 RK3588 涓婄殑涓荤郴缁熺户缁鐞嗐€?/p>
      </header>

      <section class="status-bar" aria-label="杩愯鐘舵€?>
        <article class="status-item"><span>WebSocket</span><strong id="ws-status">杩炴帴涓?/strong></article>
        <article class="status-item"><span>褰曞叆鏂瑰紡</span><strong>鎵嬪姩 / 妯℃嫙鑴氭湰</strong></article>
        <article class="status-item"><span>鐢熷懡浣撳緛璁板綍</span><strong id="vital-count">0</strong></article>
        <article class="status-item"><span>鐜鏁版嵁璁板綍</span><strong id="env-count">0</strong></article>
        <article class="status-item"><span>鏈€杩戞帴鏀舵椂闂?/span><strong id="latest-received">--</strong></article>
      </section>

      <section class="page-zone">
        <div class="zone-header">
          <div>
            <h2>鏅鸿兘瀹跺眳璁惧鎺у埗</h2>
            <p>缁熶竴灞曠ず鎴块棿璁惧鐘舵€侊紝鎵嬪姩鎺у埗缁忎富绯荤粺 API锛岃嚜鍔ㄤ簨浠跺懡浠ょ粡 MQTT 鍥炴祦鍚屾銆?/p>
          </div>
        </div>
        <div class="zone-body">
      <article class="panel">
        <h2>鏅鸿兘瀹跺眳璁惧鎺у埗涓庣姸鎬佸悓姝?/h2>
        <div class="device-panel-body">
          <div id="current-scene-status" class="current-scene-status"></div>
          <div id="device-rooms" class="device-rooms"></div>
          <div class="device-log-panel">
            <div class="device-log-toolbar">
              <h3>璁惧鍛戒护鏃ュ織</h3>
              <div class="device-log-actions">
                <button id="refresh-devices" type="button">鍒锋柊璁惧鐘舵€?/button>
                <span id="device-submit-status" class="submit-status">绛夊緟璁惧鐘舵€?/span>
              </div>
            </div>
            <div id="device-log" class="device-log"></div>
          </div>
        </div>
      </article>

        </div>
      </section>

      <section class="page-zone">

        target.textContent = text;
        target.className = `submit-status ${className}`.trim();
      }

      function setInputValue(id, value) {
        $(id).value = value;
      }

      function deviceLabel(value) {
        return deviceLabels[value] || value;
      }

      function deviceKey(device) {
        return `${device.room}/${device.device}`;
      }

      function actionLabel(action, value) {
        const labels = {
          open: "打开",
          close: "关闭",
          turn_on: "打开",
          turn_off: "关闭",
          alarm_on: "启动报警",
          alarm_off: "关闭报警",
          set_temperature: `设置温度为 ${valueOrDash(value)}°C`,
        };
        return labels[action] || action || "执行命令";
      }

      function stateLabel(state, value) {
        const labels = {
          on: "已打开",
          off: "已关闭",
          open: "已打开",
          closed: "已关闭",
          acked: "已确认执行",
        };
        const text = labels[state] || state || "状态已更新";
        return value === null || value === undefined || value === "" ? text : `${text}，当前值 ${value}`;
      }

      function describeDeviceLog(item) {
        const data = item.data ?? {};
        if (item.type === "device_command") {
          return `${deviceLabel(data.room)} 的 ${deviceLabel(data.device)} 收到命令：${actionLabel(data.action, data.value)}。`;
        }
        if (item.type === "device_state") {
          return `${deviceLabel(data.room)} 的 ${deviceLabel(data.device)} 状态变化：${stateLabel(data.state, data.value)}。`;
        }
        if (item.type === "device_ack") {
          return `${deviceLabel(data.room)} 的 ${deviceLabel(data.device)} 已确认执行命令。`;
        }
        if (item.type === "manual_command") {
          const payload = data.payload ?? {};
          return `${deviceLabel(payload.room)} 的 ${deviceLabel(payload.device)} 手动控制：${actionLabel(payload.action, payload.value)}。`;
        }
        if (item.type === "guardian_core") {
          return data.status === "devices_synced" ? "已从主系统同步设备状态。" : `主系统设备同步失败：${data.error ?? "未知错误"}`;
        }
        if (item.type === "scenario_downgraded") {
          return `${deviceLabel(data.event_room)} 发生 ${data.event_type}，但老人当前在 ${deviceLabel(data.occupant_room)}，已向 v2 链路上报正常环境值。`;
        }
        if (item.type === "error") {
          return `设备链路错误：${data.message ?? data.error ?? JSON.stringify(data)}`;
        }
        return JSON.stringify(data);
      }

      function upsertDevice(device) {
        const index = state.devices.findIndex((item) => deviceKey(item) === deviceKey(device));
        if (index >= 0) state.devices[index] = { ...state.devices[index], ...device };
        else state.devices.push(device);
        renderDevices();
      }

      function setDevices(devices) {
        state.devices = devices ?? [];
        renderDevices();
      }

      function setRoomEnv(roomEnv) {
        const next = {};
        if (Array.isArray(roomEnv)) {
          roomEnv.forEach((item) => {
            if (item?.room) next[item.room] = item;
          });
        } else if (roomEnv && typeof roomEnv === "object") {
          Object.assign(next, roomEnv);
        }
        state.roomEnv = next;
        renderDevices();
      }

      function renderCurrentSceneStatus() {
        const job = state.scenarioJob ?? {};
        const eventType = job.event_type || $("scenario-event")?.value || "normal";
        const eventRoom = job.event_room || $("scenario-event-room")?.value || "living_room";
        const status = state.scenarioRunning ? "运行中" : "未运行";
        const triggerSecond = job.trigger_second ?? Number($("scenario-trigger")?.value ?? 60);
        $("current-scene-status").innerHTML = `
          <div><span>当前风险事件</span><strong>${riskEventLabel(eventType)}</strong></div>
          <div><span>风险发生房间</span><strong>${deviceLabel(eventRoom)} (${eventRoom})</strong></div>
          <div><span>触发时间</span><strong>第 ${triggerSecond} 秒</strong></div>
          <div><span>发送状态</span><strong>${status}</strong></div>
        `;
      }

      function setDeviceLog(log) {
        state.deviceLog = (log ?? []).filter((item) => deviceActionLogTypes.has(item?.type));
        renderDeviceLog();
      }

      function roomEnvMetric(room, field, unit = "") {
        const value = state.roomEnv[room]?.[field];
        return valueOrDash(value) + (value === null || value === undefined || value === "" ? "" : unit);
      }

      function roomEnvPanel(room) {
        const env = state.roomEnv[room] ?? {};
        return `
          <div class="room-env-grid">
            <div class="room-env-item"><span>Temperature</span><strong>${roomEnvMetric(room, "temperature", "掳C")}</strong></div>
            <div class="room-env-item"><span>Humidity</span><strong>${roomEnvMetric(room, "humidity", "%")}</strong></div>
            <div class="room-env-item"><span>CO2</span><strong>${roomEnvMetric(room, "co2_ppm", " ppm")}</strong></div>
          </div>
          <div class="room-env-time">Updated: ${formatTime(env.updated_at || env.timestamp)}</div>
        `;
      }

      function deviceActionButtons(device) {
        if (device.device === "window" || device.device === "gas_valve") {
          return `
            <button type="button" onclick="commandDevice('${device.room}', '${device.device}', 'open')">Open</button>
            <button type="button" onclick="commandDevice('${device.room}', '${device.device}', 'close')">Close</button>
          `;
        }
        if (device.device === "local_alarm") {
          return `
            <button type="button" onclick="commandDevice('${device.room}', '${device.device}', 'alarm_on')">Alarm on</button>
            <button type="button" onclick="commandDevice('${device.room}', '${device.device}', 'alarm_off')">Alarm off</button>
          `;
        }
        if (device.device === "air_conditioner") {
          const key = deviceKey(device);
          const temp = device.value ?? 26;
          return `
            <button type="button" onclick="commandDevice('${device.room}', '${device.device}', 'turn_on')">Turn on</button>
            <button type="button" onclick="commandDevice('${device.room}', '${device.device}', 'turn_off')">Turn off</button>
            <div class="device-temp">
              <input id="temp-${key}" type="number" min="16" max="30" value="${temp}" />
              <button class="primary" type="button" title="Set temperature" onclick="commandDevice('${device.room}', '${device.device}', 'set_temperature', Number($('temp-${key}').value || 26))">Set</button>
            </div>
          `;
        }
        return `
          <button type="button" onclick="commandDevice('${device.room}', '${device.device}', 'turn_on')">Turn on</button>
          <button type="button" onclick="commandDevice('${device.room}', '${device.device}', 'turn_off')">Turn off</button>
        `;
      }

      function renderDevices() {
        const grouped = {};
        state.devices.forEach((device) => {
          if (!grouped[device.room]) grouped[device.room] = [];
          grouped[device.room].push(device);
        });
        const rooms = [...roomOrder, ...Object.keys(grouped).filter((room) => !roomOrder.includes(room))];
        $("device-rooms").innerHTML = rooms
          .map(
            (room) => `
              <section class="device-room">
                <h3>${deviceLabel(room)}</h3>
                ${roomOrder.includes(room) ? roomEnvPanel(room) : ""}
                ${(grouped[room] ?? [])
                  .map(
                    (device) => `
                      <article class="device-card">
                        <div class="device-head">
                          <span class="device-name">${deviceLabel(device.device)}</span>
                          <span class="device-state ${device.state}">${device.state}${device.value !== null && device.value !== undefined ? ` / ${device.value}` : ""}</span>
                        </div>
                        <div class="device-controls">${deviceActionButtons(device)}</div>
                      </article>
                    `,
                  )
                  .join("")}
              </section>
            `,
          )
          .join("");
      }

      function renderDeviceLog() {
        const actionLogs = state.deviceLog.filter((item) => deviceActionLogTypes.has(item?.type)).slice(0, 80);
        $("device-log").innerHTML = actionLogs.length
          ? actionLogs
          .map((item) => `<div class="device-log-item ${item.type}">${formatTime(item.timestamp)} ${describeDeviceLog(item)}</div>`)
          .join("")
          : `<div class="empty">No device actions yet.</div>`;
      }

      async function commandDevice(room, device, action, value = null) {
        setSubmitStatus("device-submit-status", `Sending ${room}/${device} ${action}`);
        try {
          await postJson("/api/device/command", {
            room,
            device,
            action,
            value,
            reason: "Background MQTT unified dashboard control",
          });
          setSubmitStatus("device-submit-status", "Command sent through main system", "ok");
        } catch (error) {
          setSubmitStatus("device-submit-status", `Command failed: ${error.message}`, "error");
        }
      }

      async function loadDevices() {
        const response = await fetch("/api/devices");
        const data = await response.json();
        setDevices(data.devices);
        setDeviceLog(data.device_log);
        setRoomEnv(data.room_env);
        setBathroomStayMonitor(data.bathroom_stay_monitor);
      }

      function buildVitalPayload() {
        return {
          elder_id: $("manual-vital-elder").value.trim(),
          heart_rate: Number($("manual-heart-rate").value),
          spo2: Number($("manual-spo2").value),
          systolic_bp: numberOrNull($("manual-systolic-bp").value),
          diastolic_bp: numberOrNull($("manual-diastolic-bp").value),
          body_temperature: numberOrNull($("manual-body-temperature").value),
        };
      }

      function buildEnvPayload() {
        return {
          elder_id: $("manual-env-elder").value.trim(),
          room: $("manual-room").value,
          temperature: Number($("manual-temperature").value),
          humidity: Number($("manual-humidity").value),
          co2_ppm: Number($("manual-co2").value),
          gas_ppm: Number($("manual-gas").value),
        };
      }

      function updateScenarioPreview() {
        const eventType = $("scenario-event").value;
        const eventRoom = $("scenario-event-room").value;
        const triggerSecond = Number($("scenario-trigger").value);
        $("scenario-trigger-label").textContent = `第 ${triggerSecond} 秒`;
        const methodText = eventType === "bathroom_stay_anomaly_demo"
          ? `生成卫生间持续停留 MQTT 数据，逻辑采样每 5 秒 1 组；从第 ${triggerSecond} 秒开始保持 bathroom 有人，直到超过卫生间停留参考上限后自动停止。真实演示模式每 2 秒发送 1 组，快速模式每组约 100ms。`
          : `生成 2 分钟基础 MQTT 数据，每 5 秒 1 组共 24 组，并在第 ${triggerSecond} 秒向 ${deviceLabel(eventRoom)} 注入 ${riskEventLabel(eventType)}；真实演示模式每 2 秒发送 1 组，快速模式每组约 100ms。`;
        setText("scenario-method", methodText);
        setText("scenario-event-room-note", `${deviceLabel(eventRoom)} (${eventRoom})`);
        setText("scenario-risk-level", riskLevelLabel(eventType));
        setText("scenario-expected", eventExpectations[eventType]);
        setText("template-flow", V2_PROCESSING_FLOW);
        renderCurrentSceneStatus();
      }

      function buildScenarioPayload() {
        const eventType = $("scenario-event").value;
        return {
          scene: DEFAULT_SCENARIO_SCENE,
          event_type: eventType,
          event_room: $("scenario-event-room").value,
          trigger_second: Number($("scenario-trigger").value),
          elder_id: $("scenario-elder").value.trim(),
          duration_sec: 120,
          interval_sec: 5,
          realtime_interval_sec: 2,
          realtime: $("scenario-realtime").checked,
        };
      }

      function setScenarioControlsDisabled(disabled) {
        ["scenario-event", "scenario-event-room", "scenario-trigger", "scenario-elder", "scenario-realtime"].forEach((id) => {
          $(id).disabled = disabled;
        });
      }

      function scenarioProgressText(job) {
        const sent = job.sent_samples ?? 0;
        const total = job.total_samples ?? 0;
        const messages = job.published_messages ?? 0;
        if (job.status === "running" && job.stop_requested) return `正在中断：已发送 ${sent} / 共 ${total} 组`;
        if (job.status === "running") return `发送中：已发送 ${sent} / 共 ${total} 组，${messages} 条 MQTT 消息`;
        if (job.status === "stopped") return `已中断：已发送 ${sent} / 共 ${total} 组`;
        if (job.status === "completed") return `已完成：已发送 ${sent} / 共 ${total} 组，等待 MQTT 回流`;
        if (job.status === "failed") return `发送失败：${job.error ?? "未知错误"}`;
        return "等待选择风险事件";
      }

      function stopScenarioStatusPolling() {
        if (state.scenarioStatusTimer) {
          clearInterval(state.scenarioStatusTimer);
          state.scenarioStatusTimer = null;
        }
      }

      function updateScenarioJobUi(job) {
        const running = job.status === "running";
        state.scenarioRunning = running;
        state.scenarioJob = job;
        $("submit-scenario").textContent = running ? "停止发送" : "生成并发送风险事件时间轴";
        setScenarioControlsDisabled(running);
        setSubmitStatus("scenario-submit-status", scenarioProgressText(job), job.status === "failed" ? "error" : running ? "" : "ok");
        renderCurrentSceneStatus();
        if (!running) stopScenarioStatusPolling();
      }

      async function refreshScenarioStatus() {
        const response = await fetch("/api/scenario/status");
        const job = await response.json();
        updateScenarioJobUi(job);
      }

      function startScenarioStatusPolling() {
        stopScenarioStatusPolling();
        state.scenarioStatusTimer = setInterval(() => {
          refreshScenarioStatus().catch((error) => {
            setSubmitStatus("scenario-submit-status", `鐘舵€佸埛鏂板け璐ワ細${error.message}`, "error");
          });
        }, 1000);
      }

      function applyTemplate(templateKey) {
        const template = scenarioTemplates[templateKey];
        if (!template) return;
        state.activeTemplate = templateKey;

        document.querySelectorAll(".template-button").forEach((button) => {
          button.classList.toggle("active", button.dataset.template === templateKey);
        });

        setText("template-name", riskEventLabel(templateKey));
        setText("template-event", template.event);
        setText("template-risk", template.risk);
        setText("template-reason", template.reason);

        setInputValue("manual-heart-rate", template.vital.heart_rate);
        setInputValue("manual-spo2", template.vital.spo2);
        setInputValue("manual-systolic-bp", template.vital.systolic_bp);
        setInputValue("manual-diastolic-bp", template.vital.diastolic_bp);
        setInputValue("manual-body-temperature", template.vital.body_temperature);

        setInputValue("manual-room", template.env.room);
        setInputValue("manual-temperature", template.env.temperature);
        setInputValue("manual-humidity", template.env.humidity);
        setInputValue("manual-co2", template.env.co2_ppm);
        setInputValue("manual-gas", template.env.gas_ppm);

        setSubmitStatus("template-submit-status", "模板已填入，可微调后发送");
      }

      async function postJson(url, body) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          const detail = typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail ?? data);
          throw new Error(detail || `HTTP ${response.status}`);
        }
        return data;
      }

      async function loadPersonalBaselines() {
        const elderId = $("baseline-elder").value.trim() || $("manual-vital-elder").value.trim() || "elder_001";
        $("baseline-elder").value = elderId;
        const response = await fetch(`/api/personal-baselines?elder_id=${encodeURIComponent(elderId)}`);
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          const detail = typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail ?? data);
          throw new Error(detail || `HTTP ${response.status}`);
        }
        applyBaselines(data.personal_baselines ?? []);
        return data;
      }

      function baselineByType(items, type) {
        return (items ?? []).find((item) => item.baseline_type === type) ?? null;
      }

      function applyBaselines(items) {
        const heart = baselineByType(items, "heart_rate_daily");
        const spo2 = baselineByType(items, "spo2_daily");
        const bathroom = baselineByType(items, "bathroom_routine");
        if (heart) {
          const metrics = heart.metrics ?? {};
          setInputValue("hr-p10", metrics.p10 ?? baselineDefaults.heart_rate_daily.p10);
          setInputValue("hr-p50", metrics.p50 ?? baselineDefaults.heart_rate_daily.p50);
          setInputValue("hr-p90", metrics.p90 ?? baselineDefaults.heart_rate_daily.p90);
          setInputValue("hr-night-avg", metrics.night_avg ?? baselineDefaults.heart_rate_daily.night_avg);
          setInputValue("hr-daily-avg", metrics.daily_avg ?? baselineDefaults.heart_rate_daily.daily_avg);
          setInputValue("baseline-sample-count", heart.sample_count || baselineDefaults.heart_rate_daily.sample_count);
        }
        if (spo2) {
          const metrics = spo2.metrics ?? {};
          setInputValue("spo2-p10", metrics.p10 ?? baselineDefaults.spo2_daily.p10);
          setInputValue("spo2-p50", metrics.p50 ?? baselineDefaults.spo2_daily.p50);
          setInputValue("spo2-p90", metrics.p90 ?? baselineDefaults.spo2_daily.p90);
          setInputValue("spo2-night-avg", metrics.night_avg ?? baselineDefaults.spo2_daily.night_avg);
          setInputValue("spo2-avg", metrics.avg ?? baselineDefaults.spo2_daily.avg);
        }
        if (bathroom) {
          const metrics = bathroom.metrics ?? {};
          setInputValue("bathroom-stay-avg", metrics.bathroom_stay_avg_sec ?? baselineDefaults.bathroom_routine.bathroom_stay_avg_sec);
          setInputValue("bathroom-stay-p90", metrics.bathroom_stay_p90_sec ?? baselineDefaults.bathroom_routine.bathroom_stay_p90_sec);
          setInputValue("bathroom-sample-count", bathroom.sample_count || metrics.sample_count || baselineDefaults.bathroom_routine.sample_count);
        }
      }

      function fillBaselineDefaults() {
        const heart = baselineDefaults.heart_rate_daily;
        const spo2 = baselineDefaults.spo2_daily;
        const bathroom = baselineDefaults.bathroom_routine;
        setInputValue("baseline-elder", $("manual-vital-elder").value.trim() || "elder_001");
        setInputValue("baseline-sample-count", heart.sample_count);
        setInputValue("hr-p10", heart.p10);
        setInputValue("hr-p50", heart.p50);
        setInputValue("hr-p90", heart.p90);
        setInputValue("hr-night-avg", heart.night_avg);
        setInputValue("hr-daily-avg", heart.daily_avg);
        setInputValue("spo2-p10", spo2.p10);
        setInputValue("spo2-p50", spo2.p50);
        setInputValue("spo2-p90", spo2.p90);
        setInputValue("spo2-night-avg", spo2.night_avg);
        setInputValue("spo2-avg", spo2.avg);
        setInputValue("bathroom-stay-avg", bathroom.bathroom_stay_avg_sec);
        setInputValue("bathroom-stay-p90", bathroom.bathroom_stay_p90_sec);
        setInputValue("bathroom-sample-count", bathroom.sample_count);
      }

      function baselineBase(type, metrics) {
        return {
          elder_id: $("baseline-elder").value.trim() || "elder_001",
          baseline_type: type,
          scope: "default",
          timezone: "Asia/Shanghai",
          lookback_days: 14,
          sample_count: Number($("baseline-sample-count").value || 1),
          quality: "stable",
          metrics,
        };
      }

      function buildHeartBaseline() {
        return baselineBase("heart_rate_daily", {
          p10: Number($("hr-p10").value),
          p50: Number($("hr-p50").value),
          p90: Number($("hr-p90").value),
          night_avg: Number($("hr-night-avg").value),
          daily_avg: Number($("hr-daily-avg").value),
          sample_count: Number($("baseline-sample-count").value || 1),
        });
      }

      function buildSpo2Baseline() {
        return baselineBase("spo2_daily", {
          p10: Number($("spo2-p10").value),
          p50: Number($("spo2-p50").value),
          p90: Number($("spo2-p90").value),
          night_avg: Number($("spo2-night-avg").value),
          avg: Number($("spo2-avg").value),
          sample_count: Number($("baseline-sample-count").value || 1),
        });
      }

      function buildBathroomBaseline() {
        const sampleCount = Number($("bathroom-sample-count").value || $("baseline-sample-count").value || 1);
        return {
          ...baselineBase("bathroom_routine", {
            bathroom_stay_avg_sec: Number($("bathroom-stay-avg").value),
            bathroom_stay_p90_sec: Number($("bathroom-stay-p90").value),
            sample_count: sampleCount,
          }),
          sample_count: sampleCount,
        };
      }

      async function saveBaseline(kind, builder) {
        const button = $(kind);
        button.disabled = true;
        setSubmitStatus("baseline-submit-status", "保存中");
        try {
          await postJson("/api/personal-baselines", builder());
          setSubmitStatus("baseline-submit-status", "基线已保存到 Edge MCP", "ok");
          await loadPersonalBaselines();
        } catch (error) {
          setSubmitStatus("baseline-submit-status", `保存失败：${error.message}`, "error");
        } finally {
          button.disabled = false;
        }
      }

      function setBaselineMode(mode) {
        const autoMode = mode === "auto";
        $("manual-baseline-panel").hidden = autoMode;
        $("auto-baseline-panel").hidden = !autoMode;
        $("baseline-manual-mode").classList.toggle("primary", !autoMode);
        $("baseline-auto-mode").classList.toggle("primary", autoMode);
        setSubmitStatus(
          "baseline-submit-status",
          autoMode
            ? "自动生成模式：数据会先进入 MQTT，再由 Edge 行为片段统计个人基线"
            : "手动设置模式：直接保存个人基线"
        );
      }

      function summarizeBaselineRebuild(result) {
        const baselines = result.rebuild?.personal_baselines ?? result.personal_baselines ?? [];
        const labels = baselines.map((item) => item.baseline_type).join("、") || "个人基线";
        const segmentCount = result.rebuild?.behavior_segments ?? result.behavior_segments ?? 0;
        return `${labels} 已更新，行为片段 ${segmentCount} 条`;
      }

      function todayDateValue() {
        const date = new Date();
        const offset = date.getTimezoneOffset();
        return new Date(date.getTime() - offset * 60000).toISOString().slice(0, 10);
      }

      function metricLine(label, value, suffix = "") {
        return `<div><span>${label}</span><strong>${valueOrDash(value)}${value === null || value === undefined ? "" : suffix}</strong></div>`;
      }

      function renderMetricBlock(items) {
        return `<div class="baseline-fields">${items.join("")}</div>`;
      }

      function renderDailyHealthSummary(summary) {
        const stats = summary?.local_stats ?? {};
        const vitals = stats.vitals ?? {};
        const heart = vitals.heart_rate ?? {};
        const spo2 = vitals.spo2 ?? {};
        $("daily-vitals").innerHTML = renderMetricBlock([
          metricLine("心率样本", heart.count),
          metricLine("心率平均", heart.avg, " bpm"),
          metricLine("心率最低/最高", `${valueOrDash(heart.min)} / ${valueOrDash(heart.max)}`, " bpm"),
          metricLine("心率参考", `${valueOrDash(heart.baseline_low)} / ${valueOrDash(heart.baseline_normal)} / ${valueOrDash(heart.baseline_high)}`),
          metricLine("血氧样本", spo2.count),
          metricLine("血氧平均", spo2.avg, "%"),
          metricLine("血氧最低/最高", `${valueOrDash(spo2.min)} / ${valueOrDash(spo2.max)}`, "%"),
          metricLine("血氧参考", `${valueOrDash(spo2.baseline_low)} / ${valueOrDash(spo2.baseline_normal)} / ${valueOrDash(spo2.baseline_high)}`),
        ]);

      function envRecordTimestamp(record) {
        const data = record?.payload ?? {};

        return date && !Number.isNaN(date.getTime()) ? date : null;

      function roomFromHomeSnapshot(data) {
        if (data?.schema === "home_environment_snapshot_v1" && data.rooms) {
          return roomOrder.find((room) => Boolean(data.rooms?.[room]?.presence)) || data.occupant_room || data.room || "--";
        }
        return data?.room || "--";
      }

      function envPayloadForDisplay(data, room) {
        if (data?.schema === "home_environment_snapshot_v1" && data.rooms) {
          return data.rooms?.[room] || data.rooms?.[data.occupant_room] || data.rooms?.living_room || {};
        }
        return data || {};
      }

      function buildBathroomStayElapsedMap(records) {
        const map = new Map();
        let bathroomEnteredAt = null;
        let lastBathroomElapsed = 0;
        let activeSequence = null;
        [...records]
          .filter((record) => ["bathroom_stay_demo", "bathroom_baseline_generator"].includes((record.payload ?? {}).source))
          .sort((a, b) => (envRecordTimestamp(a)?.getTime() || 0) - (envRecordTimestamp(b)?.getTime() || 0))
          .forEach((record) => {
            const data = record.payload ?? {};
            const timestamp = envRecordTimestamp(record);
            const room = roomFromHomeSnapshot(data);
            const sampleId = data.snapshot_id || record.sample_id || record.record_no;
            if (!timestamp) return;
            const sequence = data.bathroom_stay_sequence ?? data.snapshot_id;
            if (activeSequence !== sequence) {
              activeSequence = sequence;
              bathroomEnteredAt = null;
              lastBathroomElapsed = 0;
            }
            if (Number.isFinite(Number(data.bathroom_stay_elapsed_sec))) {
              const elapsed = Number(data.bathroom_stay_elapsed_sec);
              lastBathroomElapsed = elapsed;
              map.set(sampleId, elapsed);
              if (room !== "bathroom") bathroomEnteredAt = null;
              return;
            }
            if (room === "bathroom") {
              if (!bathroomEnteredAt) bathroomEnteredAt = timestamp;
              const elapsed = Math.max(0, Math.round((timestamp.getTime() - bathroomEnteredAt.getTime()) / 1000));
              lastBathroomElapsed = elapsed;
              map.set(sampleId, elapsed);
            } else {
              const completed = Number(data.bathroom_stay_completed_sec);
              if (Number.isFinite(completed) && completed > 0) {
                lastBathroomElapsed = completed;
                map.set(sampleId, completed);
              } else {
                map.set(sampleId, lastBathroomElapsed > 0 ? lastBathroomElapsed : 0);
              }
              bathroomEnteredAt = null;
            }
          });
        return map;
      }

      function connectWs() {
        const protocol = location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${protocol}://${location.host}/ws`);
        ws.onopen = () => {
          $("ws-status").textContent = "已连接";
        };
        ws.onclose = () => {
          $("ws-status").textContent = "重连中";
          setTimeout(connectWs, 1500);
        };
        ws.onmessage = (event) => {
          const message = JSON.parse(event.data);
          if (message.type === "snapshot") {
            setRecords(message.data);
            setDevices(message.devices);
            setDeviceLog(message.device_log);
            setRoomEnv(message.room_env);
            setBathroomStayMonitor(message.bathroom_stay_monitor);
          }
          if (message.type === "mqtt_record") {
            addRecord(message.data);
          }
          if (message.room_env) {
            setRoomEnv(message.room_env);
          }
          if (message.devices) {
            setDevices(message.devices);
          }
          if (message.device_log) {
            setDeviceLog(message.device_log);
          }
          if (message.bathroom_stay_monitor) {
            setBathroomStayMonitor(message.bathroom_stay_monitor);
          }
          if (message.type === "daily_health_summary" && message.data?.daily_health_summary) {
            renderDailyHealthSummary(message.data.daily_health_summary);
          }
          if (message.type === "device_state") {
            upsertDevice(message.data);
          }
        };
      }

            startScenarioStatusPolling();
          }
        } catch (error) {
          setSubmitStatus("scenario-submit-status", `发送失败：${error.message}`, "error");
        } finally {
          button.disabled = false;
        }
      });

      $("load-baselines").addEventListener("click", async () => {
        setSubmitStatus("baseline-submit-status", "读取中");
        try {
          await loadPersonalBaselines();
          setSubmitStatus("baseline-submit-status", "当前基线已读取", "ok");
        } catch (error) {
          setSubmitStatus("baseline-submit-status", `读取失败：${error.message}`, "error");
        }
      });

      $("fill-baseline-defaults").addEventListener("click", () => {
        fillBaselineDefaults();
        setSubmitStatus("baseline-submit-status", "已填写建议默认值");
      });

      $("save-heart-baseline").addEventListener("click", () => saveBaseline("save-heart-baseline", buildHeartBaseline));
      $("save-spo2-baseline").addEventListener("click", () => saveBaseline("save-spo2-baseline", buildSpo2Baseline));
      $("save-bathroom-baseline").addEventListener("click", () => saveBaseline("save-bathroom-baseline", buildBathroomBaseline));
      $("baseline-manual-mode").addEventListener("click", () => setBaselineMode("manual"));
      $("baseline-auto-mode").addEventListener("click", () => setBaselineMode("auto"));
      $("auto-vitals-baseline").addEventListener("click", runAutoVitalsBaseline);
      $("auto-bathroom-baseline").addEventListener("click", runAutoBathroomBaseline);
      $("demo-bathroom-stay").addEventListener("click", runBathroomStayDemo);
      $("daily-summary-local").addEventListener("click", async () => {
        const button = $("daily-summary-local");
        button.disabled = true;
        try {
          await generateDailyHealthSummary(false);
        } catch (error) {
          setSubmitStatus("daily-summary-status", `本地统计失败：${error.message}`, "error");
        } finally {
          button.disabled = false;
        }
      });
      $("daily-summary-cloud").addEventListener("click", async () => {
        const button = $("daily-summary-cloud");
        button.disabled = true;
        try {
          await generateDailyHealthSummary(true);
        } catch (error) {
          setSubmitStatus("daily-summary-status", `每日摘要失败：${error.message}`, "error");
        } finally {
          button.disabled = false;
        }
      });
      $("daily-summary-load").addEventListener("click", async () => {
        setSubmitStatus("daily-summary-status", "读取最近摘要中");
        try {
          await loadDailyHealthSummaries();
          setSubmitStatus("daily-summary-status", "最近摘要已读取", "ok");
        } catch (error) {
          setSubmitStatus("daily-summary-status", `读取摘要失败：${error.message}`, "error");
        }
      });
      $("vision-capture-one").addEventListener("click", async () => {
        const button = $("vision-capture-one");
        button.disabled = true;
        setSubmitStatus("vision-submit-status", "正在从真实摄像头拍照");
        try {
          await captureOneImage();
          setSubmitStatus("vision-submit-status", "已拍照并保存到最近五张", "ok");
        } catch (error) {
          setSubmitStatus("vision-submit-status", `拍照失败：${error.message}`, "error");
        } finally {
          button.disabled = false;
        }
      });
      $("vision-import-files").addEventListener("change", (event) => {
        setVisionImportFiles(event.target.files);
      });
      $("vision-import-captures").addEventListener("click", async () => {
        const button = $("vision-import-captures");
        button.disabled = true;
        setSubmitStatus("vision-submit-status", "正在导入五张图片到视觉服务");
        try {
          const result = await importVisionCaptures();
          setSubmitStatus("vision-submit-status", `已导入 ${result.count ?? 5}/5 张；后续请在风险事件时间轴选择疑似跌倒或长时间静止`, "ok");
        } catch (error) {
          setSubmitStatus("vision-submit-status", `导入失败：${error.message}`, "error");
        } finally {
          button.disabled = false;
        }
      });
      $("vision-clear-captures").addEventListener("click", async () => {
        try {
          await clearVisionCaptures();
          setSubmitStatus("vision-submit-status", "已清除待使用照片池", "ok");
        } catch (error) {
          setSubmitStatus("vision-submit-status", `清除失败：${error.message}`, "error");
        }
      });

      $("clear-local").addEventListener("click", () => {
        setRecords([]);
      });

      $("refresh-devices").addEventListener("click", async () => {
        try {
          await loadDevices();
          setSubmitStatus("device-submit-status", "Devices refreshed from main system", "ok");
        } catch (error) {
          setSubmitStatus("device-submit-status", `Refresh failed: ${error.message}`, "error");
        }
      });

      applyTemplate(state.activeTemplate);
      fillBaselineDefaults();
      setBaselineMode("manual");
      $("daily-summary-date").value = todayDateValue();
      $("daily-summary-elder").value = $("baseline-elder").value.trim() || "elder_001";
      updateScenarioPreview();
      loadSnapshot();
      loadDevices().catch((error) => {
        setSubmitStatus("device-submit-status", `Device load failed: ${error.message}`, "error");
      });
      loadPersonalBaselines().catch((error) => {
        setSubmitStatus("baseline-submit-status", `鍩虹嚎璇诲彇澶辫触锛?{error.message}`, "error");
      });
      loadDailyHealthSummaries().catch((error) => {
        setSubmitStatus("daily-summary-status", `鎽樿璇诲彇澶辫触锛?{error.message}`, "error");
      });
      refreshVisionCaptures().catch(() => {});
      refreshScenarioStatus().catch(() => {});
      connectWs();
    </script>
  </body>
</html>
